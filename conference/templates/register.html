{% load static %}

<!DOCTYPE html>
<html>

<head>

<title>Conference Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#f5f7fa;">

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow">

<div class="card-header bg-primary text-white text-center">

<h2>
Conference Registration
</h2>

</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">
Full Name
</label>

{{ form.full_name }}

</div>

<div class="mb-3">

<label class="form-label">
Email
</label>

{{ form.email }}

</div>

<div class="mb-3">

<label class="form-label">
Phone
</label>

{{ form.phone }}

</div>

<div class="mb-3">

<label class="form-label">
Organization
</label>

{{ form.organization }}

</div>

<div class="mb-3">

<label class="form-label">
Country
</label>

{{ form.country }}

</div>

<button
type="submit"
class="btn btn-success w-100">

Register Now

</button>

</form>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
