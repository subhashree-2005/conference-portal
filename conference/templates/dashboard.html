{% load static %}

<!DOCTYPE html>
<html>

<head>

<title>Conference Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body style="background:#f4f7fc;">

<div class="container mt-5">

<h1 class="text-center mb-5">
Conference Dashboard
</h1>

<div class="row">

<div class="col-md-3">
<div class="card shadow text-center p-3">
<h2>{{ participant_count }}</h2>
<p>Participants</p>
</div>
</div>

<div class="col-md-3">
<div class="card shadow text-center p-3">
<h2>{{ paper_count }}</h2>
<p>Papers</p>
</div>
</div>

<div class="col-md-3">
<div class="card shadow text-center p-3">
<h2>{{ speaker_count }}</h2>
<p>Speakers</p>
</div>
</div>

<div class="col-md-3">
<div class="card shadow text-center p-3">
<h2>{{ announcement_count }}</h2>
<p>Announcements</p>
</div>
</div>

</div>

<div class="row mt-5">

<div class="col-md-8 mx-auto">

<canvas id="dashboardChart"></canvas>

</div>

</div>

</div>

<script>

const ctx =
document.getElementById('dashboardChart');

new Chart(ctx, {

type: 'bar',

data: {

labels: [
'Participants',
'Papers',
'Speakers',
'Announcements'
],

datasets: [{

label: 'Conference Data',

data: [
{{ participant_count }},
{{ paper_count }},
{{ speaker_count }},
{{ announcement_count }}
]

}]

}

});

</script>

</body>

</html>
