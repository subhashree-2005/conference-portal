{% load static %}

<!DOCTYPE html>
<html>

<head>

<title>Submit Research Paper</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#f5f7fa;">

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow">

<div class="card-header bg-success text-white text-center">

<h2>
Research Paper Submission
</h2>

</div>

<div class="card-body">

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">
Paper Title
</label>

{{ form.paper_title }}

</div>

<div class="mb-3">

<label class="form-label">
Author Name
</label>

{{ form.author_name }}

</div>

<div class="mb-3">

<label class="form-label">
Email
</label>

{{ form.email }}

</div>

<div class="mb-3">

<label class="form-label">
Abstract
</label>

{{ form.abstract }}

</div>

<div class="mb-3">

<label class="form-label">
Paper PDF
</label>

{{ form.paper_pdf }}

</div>

<button
type="submit"
class="btn btn-success w-100">

Submit Paper

</button>

</form>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
